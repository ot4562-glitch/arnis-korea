name: Build Arnis Korea v0.9 Windows Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "arnis-korea-v*"

env:
  ARTIFACT_NAME: arnis-korea-0.9.0-windows_x86_64
  PYTHONPATH: src

permissions:
  contents: read

jobs:
  build-windows:
    name: trace-editor-windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python compile and GUI build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip pyinstaller
          python -m compileall scripts src
          python -m arnis_korea_detailed.trace_editor_core self-test --output-dir smoke
          python scripts\arnis_korea_gui.py --self-test-gui
          pyinstaller --clean --onefile --windowed --name arnis-korea --paths src scripts\arnis_korea_gui.py
          pyinstaller --clean --onefile --name arnis-korea-cli --paths src src\arnis_korea_detailed\trace_editor_core.py
          if (-not (Test-Path dist\arnis-korea.exe)) { throw "missing GUI exe" }
          if (-not (Test-Path dist\arnis-korea-cli.exe)) { throw "missing dev CLI exe" }

      - name: Trace editor QA
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force smoke\qa | Out-Null
          python -m arnis_korea_detailed.trace_editor_core self-test --output-dir smoke\qa | Tee-Object -FilePath trace-editor-self-test.json
          $summary = Get-Content trace-editor-self-test.json -Raw | ConvertFrom-Json
          foreach ($key in @("MOCK_PROJECT_CREATE","MOCK_RASTER_LOAD","SUGGESTED_LAYER_GENERATION","SUGGESTED_TO_ACCEPTED_APPROVAL","ACCEPTED_LAYERS_EXPORT","SYNTHETIC_OSM_PREVIEW_EXPORT","SOURCE_POLICY")) {
            if ($summary.$key -ne "PASS") { throw "$key failed" }
          }
          $project = $summary.project_dir
          if (-not (Test-Path "$project\project.arniskorea.json")) { throw "project file missing" }
          if (-not (Test-Path "$project\accepted_layers.geojson")) { throw "accepted layer missing" }
          if (-not (Test-Path "$project\suggested_layers.geojson")) { throw "suggested layer missing" }
          if (-not (Test-Path "$project\synthetic_osm_preview.json")) { throw "synthetic preview missing" }
          if (-not (Test-Path "$project\reports\trace-editor-validation.json")) { throw "validation report missing" }
          $accepted = Get-Content "$project\accepted_layers.geojson" -Raw | ConvertFrom-Json
          if ($accepted.features.Count -lt 1) { throw "accepted layer export empty" }
          foreach ($feature in $accepted.features) {
            if ($feature.properties.approved_by_user -ne $true) { throw "unapproved accepted feature" }
          }
          $synthetic = Get-Content "$project\synthetic_osm_preview.json" -Raw | ConvertFrom-Json
          if ($synthetic.world_generation -ne "disabled_until_v1.1") { throw "worldgen policy missing" }
          $policy = Get-Content "$project\reports\source-policy-report.json" -Raw | ConvertFrom-Json
          if ($policy.passed -ne $true) { throw "source policy failed" }

      - name: Assemble artifact root
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force package\dev-tools, package\docs, package\examples | Out-Null
          Copy-Item dist\arnis-korea.exe package\arnis-korea.exe
          Copy-Item dist\arnis-korea-cli.exe package\dev-tools\arnis-korea-cli.exe
          Copy-Item README.md package\
          Copy-Item WINDOWS_QUICKSTART.md package\
          Copy-Item NAVER_CLOUD_MAPS_KEY_GUIDE.md package\
          Copy-Item windows\open-gui.bat package\open-gui.bat
          Copy-Item docs\*.md package\docs\
          Copy-Item sample_bbox_hufs.json package\examples\
          Copy-Item web\dynamic_selector.html package\examples\dynamic_selector.html
          if (Test-Path package\arnis-korea-cli.exe) { throw "CLI exe must not be artifact root" }
          Get-ChildItem package -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force
          if (-not (Test-Path package\arnis-korea.exe)) { throw "GUI exe not found at artifact root" }

      - name: Source and artifact policy scans
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_scan.py .
          python scripts/release_scan.py package
          p1='g''hp_'
          p2='github''_pat_'
          p3='naver_maps_api''_key'
          if grep -RInE "$p1|$p2|$p3" --exclude-dir=.git --exclude-dir=smoke --exclude='*.exe' --exclude='release_scan.py' . package; then
            echo "secret marker scan failed" >&2
            exit 1
          fi
          if find package -type f \( -name '*.mca' -o -name 'level.dat' -o -name 'session.lock' -o -name '*.jar' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.ppm' \) | grep .; then
            echo "generated raster/world/cache file leaked into package" >&2
            exit 1
          fi
          if find package -type d \( -iname 'naver_raster' -o -iname 'cache' -o -iname 'debug' -o -iname 'world' -o -iname 'outputs' \) | grep .; then
            echo "generated directory leaked into package" >&2
            exit 1
          fi

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Path package\* -DestinationPath "$env:ARTIFACT_NAME.zip" -Force
          Get-FileHash "$env:ARTIFACT_NAME.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $env:ARTIFACT_NAME.zip" } |
            Out-File SHA256SUMS.windows -Encoding ascii
          Get-ChildItem package -Recurse | ForEach-Object { $_.FullName.Replace((Resolve-Path package).Path + "\", "") } |
            Out-File MANIFEST.windows.txt -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: arnis-korea-0.9.0-windows_x86_64
          path: |
            arnis-korea-0.9.0-windows_x86_64.zip
            SHA256SUMS.windows
            MANIFEST.windows.txt

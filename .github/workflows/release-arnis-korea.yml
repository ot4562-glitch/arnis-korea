name: Release Arnis Korea Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "arnis-korea-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTIFACT_NAME: arnis-korea-0.6.0-windows-x86_64

permissions:
  contents: read

jobs:
  build-windows:
    name: build-windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Ensure upstream Arnis source
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f upstream/arnis/Cargo.toml ]; then
            mkdir -p upstream
            git clone --depth 1 https://github.com/louis-e/arnis upstream/arnis
          fi

      - name: Build patched Arnis no-network renderer
        shell: bash
        run: |
          set -euo pipefail
          python scripts/patch_arnis_no_network.py
          cargo build --release --no-default-features --manifest-path upstream/arnis/Cargo.toml --target-dir upstream/arnis/target
          test -f upstream/arnis/target/release/arnis.exe

      - name: Build GUI and CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip pyinstaller
          python -m compileall scripts src
          python scripts\arnis_korea_gui.py --self-test-gui
          pyinstaller --clean --onefile --windowed --name arnis-korea --paths src scripts\arnis_korea_gui.py
          pyinstaller --clean --onefile --name arnis-korea-cli --paths src --hidden-import urllib --hidden-import urllib.request --hidden-import urllib.parse --hidden-import urllib.error --hidden-import urllib.response --collect-submodules urllib scripts\arnis_korea_detailed.py
          if (-not (Test-Path dist\arnis-korea.exe)) { throw "missing GUI exe" }
          if (-not (Test-Path dist\arnis-korea-cli.exe)) { throw "missing CLI exe" }

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force package\bin, package\web, package\examples, package\docs, package\scripts, package\src | Out-Null

          Copy-Item dist\arnis-korea.exe package\arnis-korea.exe
          Copy-Item dist\arnis-korea-cli.exe package\arnis-korea-cli.exe

          Copy-Item upstream\arnis\target\release\arnis.exe package\bin\arnis-korea-renderer.exe

          Copy-Item README.md package\
          Copy-Item WINDOWS_QUICKSTART.md package\
          Copy-Item NAVER_CLOUD_MAPS_KEY_GUIDE.md package\
          Copy-Item config.example.yml package\
          Copy-Item sample_bbox_hufs.json package\
          Copy-Item LICENSE package\
          Copy-Item NOTICE package\
          Copy-Item THIRD_PARTY_LICENSES.md package\
          Copy-Item web\dynamic_selector.html package\web\
          Copy-Item examples\mock_raster.ppm package\examples\
          Copy-Item docs\*.md package\docs\
          Copy-Item -Recurse src\arnis_korea_detailed package\src\
          Copy-Item scripts\arnis_korea_detailed.py package\scripts\
          Copy-Item scripts\arnis_korea_gui.py package\scripts\
          Copy-Item windows\open-gui.bat package\open-gui.bat
          Copy-Item windows\run-help.bat package\run-help.bat
          Copy-Item windows\generate-hufs-naver-mock.bat package\generate-hufs-naver-mock.bat
          Copy-Item windows\plan-hufs-static.bat package\plan-hufs-static.bat
          Get-ChildItem package -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force

      - name: Windows smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\package\arnis-korea-cli.exe help
          & .\package\arnis-korea-cli.exe version
          & .\package\arnis-korea-cli.exe plan-static --bbox-file package\sample_bbox_hufs.json | Out-File plan-static.json -Encoding utf8
          New-Item -ItemType Directory -Force smoke | Out-Null
          & .\package\arnis-korea-cli.exe mock-vectorize --bbox-file package\sample_bbox_hufs.json --output-dir smoke\outputs
          & .\package\arnis-korea-cli.exe generate --bbox "37.5955,127.0555,37.5985,127.0620" --output-dir smoke\smoke-output --world-name "world-readable-smoke" --source mock-naver --terrain=false --interior=false --roof=true --building-mode map-readable --noise-filter-level high --road-width-multiplier 1.5

          $world = "smoke\smoke-output\world-readable-smoke"
          $project = "smoke\smoke-output\arnis_korea_project"
          if (-not (Test-Path "$world\level.dat")) { throw "level.dat not found" }
          if (-not (Test-Path "$world\session.lock")) { throw "session.lock not found" }
          if (-not (Test-Path "$world\region")) { throw "region folder not found" }
          $mca = Get-ChildItem "$world\region" -Filter *.mca | Select-Object -First 1
          if (-not $mca) { throw ".mca file not found" }
          foreach ($bad in @("naver_raster", "features.normalized.json", "naver_synthetic_osm.json", "naver_world_features.json", "source-policy-report.json", "arnis-korea-quality-report.md")) {
            if (Test-Path (Join-Path $world $bad)) { throw "forbidden file in world root: $bad" }
          }
          if (-not (Test-Path "$project\world_validation.json")) { throw "world_validation.json not found" }
          if (-not (Test-Path "$project\arnis-korea-quality-report.md")) { throw "quality report not found" }
          foreach ($preview in @("original_static_map.png", "segmentation_preview.png", "class_mask_roads.png", "class_mask_buildings.png", "class_mask_green_water.png", "world_overlay_preview.png")) {
            if (-not (Test-Path (Join-Path "$project\debug" $preview))) { throw "debug preview not found: $preview" }
          }
          $features = Get-Content "$project\features.normalized.json" -Raw | ConvertFrom-Json
          if ($features.metadata.filtering.feature_count_after_filter -ge $features.metadata.filtering.feature_count_before_filter) { throw "filter did not reduce features" }
          if ($features.metadata.filtering.dropped_noise_count -le 0) { throw "noise filter did not drop noise" }
          $quality = Get-Content "$project\arnis-korea-quality-report.md" -Raw
          if ($quality -notmatch "map_readability_score") { throw "map_readability_score missing" }
          $validation = Get-Content "$project\world_validation.json" -Raw | ConvertFrom-Json
          if ($validation.valid -ne $true) { throw "world validation failed" }
          $policy = Get-Content "$project\source-policy-report.json" -Raw | ConvertFrom-Json
          if ($policy.external_non_naver_sources_used -ne $false) { throw "source policy failed" }
          if ($policy.renderer_network_disabled -ne $true) { throw "renderer network policy failed" }
          if ($policy.synthetic_input_used -ne $true) { throw "synthetic input policy failed" }
          if (-not (Test-Path package\arnis-korea.exe)) { throw "GUI exe not found" }
          if (Get-ChildItem package -Recurse -Include *.png,*.mca,level.dat,session.lock -ErrorAction SilentlyContinue) { throw "generated raster/world/debug file leaked into package" }
          $gui = Start-Process -FilePath ".\package\arnis-korea.exe" -ArgumentList "--self-test-gui" -Wait -PassThru
          if ($gui.ExitCode -ne 0) { throw "GUI self-test failed with $($gui.ExitCode)" }

      - name: Secret and policy scan
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_scan.py .
          python scripts/release_scan.py package
          p1='g''hp_'
          p2='github''_pat_'
          p3='/etc/minseong/''secrets'
          p4='naver_maps_api''_key'
          if grep -RInE "$p1|$p2|$p3|$p4" --exclude-dir=.git --exclude='release_scan.py' . package; then
            echo "secret or policy scan failed" >&2
            exit 1
          fi

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Path package\* -DestinationPath "$env:ARTIFACT_NAME.zip" -Force
          Get-FileHash "$env:ARTIFACT_NAME.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $env:ARTIFACT_NAME.zip" } |
            Out-File SHA256SUMS.windows -Encoding ascii
          Get-ChildItem package -Recurse | ForEach-Object { $_.FullName.Replace((Resolve-Path package).Path + "\", "") } |
            Out-File MANIFEST.windows.txt -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: arnis-korea-0.6.0-windows-x86_64
          path: |
            arnis-korea-0.6.0-windows-x86_64.zip
            SHA256SUMS.windows
            MANIFEST.windows.txt

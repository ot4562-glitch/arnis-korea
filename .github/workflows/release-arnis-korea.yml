name: Release Arnis Korea Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "arnis-korea-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTIFACT_NAME: arnis-korea-0.2.0-windows-x86_64

permissions:
  contents: read

jobs:
  build-windows:
    name: build-windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Ensure upstream Arnis source
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f upstream/arnis/Cargo.toml ]; then
            mkdir -p upstream
            git clone --depth 1 https://github.com/louis-e/arnis upstream/arnis
          fi

      - name: Build upstream Arnis
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --no-default-features --manifest-path upstream/arnis/Cargo.toml --target-dir upstream/arnis/target
          find upstream/arnis/target -type f -name 'arnis.exe' -print

      - name: Build GUI and CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip pyinstaller
          python -m compileall scripts src
          python scripts\arnis_korea_gui.py --self-test-gui
          pyinstaller --clean --onefile --windowed --name arnis-korea --paths src scripts\arnis_korea_gui.py
          pyinstaller --clean --onefile --name arnis-korea-cli --paths src --hidden-import urllib --hidden-import urllib.request --hidden-import urllib.parse --hidden-import urllib.error --hidden-import urllib.response --collect-submodules urllib scripts\arnis_korea_detailed.py
          if (-not (Test-Path dist\arnis-korea.exe)) { throw "missing GUI exe" }
          if (-not (Test-Path dist\arnis-korea-cli.exe)) { throw "missing CLI exe" }

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force package\bin, package\web, package\examples, package\docs, package\scripts, package\src | Out-Null

          Copy-Item dist\arnis-korea.exe package\arnis-korea.exe
          Copy-Item dist\arnis-korea-cli.exe package\arnis-korea-cli.exe

          $arnisExe = Get-ChildItem upstream\arnis\target -Recurse -Filter "arnis.exe" | Select-Object -First 1
          if (-not $arnisExe) { throw "Could not find upstream Arnis exe under upstream\arnis\target" }
          Copy-Item $arnisExe.FullName package\bin\arnis-upstream.exe

          Copy-Item README.md package\
          Copy-Item WINDOWS_QUICKSTART.md package\
          Copy-Item NAVER_CLOUD_MAPS_KEY_GUIDE.md package\
          Copy-Item config.example.yml package\
          Copy-Item sample_bbox_hufs.json package\
          Copy-Item LICENSE package\
          Copy-Item NOTICE package\
          Copy-Item THIRD_PARTY_LICENSES.md package\
          Copy-Item web\dynamic_selector.html package\web\
          Copy-Item examples\mock_raster.ppm package\examples\
          Copy-Item docs\*.md package\docs\
          Copy-Item -Recurse src\arnis_korea_detailed package\src\
          Copy-Item scripts\arnis_korea_detailed.py package\scripts\
          Copy-Item scripts\arnis_korea_gui.py package\scripts\
          Copy-Item windows\open-gui.bat package\open-gui.bat
          Copy-Item windows\run-help.bat package\run-help.bat
          Copy-Item windows\generate-hufs-osm.bat package\generate-hufs-osm.bat
          Copy-Item windows\plan-hufs-static.bat package\plan-hufs-static.bat

      - name: Windows smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\package\arnis-korea-cli.exe help
          & .\package\arnis-korea-cli.exe version
          & .\package\arnis-korea-cli.exe plan-static --bbox-file package\sample_bbox_hufs.json | Out-File plan-static.json -Encoding utf8
          New-Item -ItemType Directory -Force smoke | Out-Null
          & .\package\arnis-korea-cli.exe mock-vectorize --bbox-file package\sample_bbox_hufs.json --output-dir smoke\outputs
          & .\package\arnis-korea-cli.exe generate --bbox "37.5955,127.0555,37.5985,127.0620" --output-dir smoke\world-hufs --source osm --terrain --interior=false --roof=true

          $level = Get-ChildItem smoke\world-hufs -Recurse -Filter level.dat | Select-Object -First 1
          if (-not $level) { throw "level.dat not found" }
          $region = Get-ChildItem smoke\world-hufs -Recurse -Directory -Filter region | Select-Object -First 1
          if (-not $region) { throw "region folder not found" }
          $mca = Get-ChildItem smoke\world-hufs -Recurse -Filter *.mca | Select-Object -First 1
          if (-not $mca) { throw ".mca file not found" }
          if (-not (Test-Path package\arnis-korea.exe)) { throw "GUI exe not found" }
          $gui = Start-Process -FilePath ".\package\arnis-korea.exe" -ArgumentList "--self-test-gui" -Wait -PassThru
          if ($gui.ExitCode -ne 0) { throw "GUI self-test failed with $($gui.ExitCode)" }

      - name: Secret and policy scan
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release_scan.py .
          python scripts/release_scan.py package
          p1='g''hp_'
          p2='github''_pat_'
          p3='/etc/minseong/''secrets'
          p4='naver_maps_api''_key'
          if grep -RInE "$p1|$p2|$p3|$p4" --exclude-dir=.git --exclude='release_scan.py' . package; then
            echo "secret or policy scan failed" >&2
            exit 1
          fi

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Path package\* -DestinationPath "$env:ARTIFACT_NAME.zip" -Force
          Get-FileHash "$env:ARTIFACT_NAME.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $env:ARTIFACT_NAME.zip" } |
            Out-File SHA256SUMS.windows -Encoding ascii
          Get-ChildItem package -Recurse | ForEach-Object { $_.FullName.Replace((Resolve-Path package).Path + "\", "") } |
            Out-File MANIFEST.windows.txt -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: arnis-korea-0.2.0-windows-x86_64
          path: |
            arnis-korea-0.2.0-windows-x86_64.zip
            SHA256SUMS.windows
            MANIFEST.windows.txt
